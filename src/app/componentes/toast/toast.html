<div class="position-fixed toast-container" style="z-index: 1200">
  <div #toast
       class="toast align-items-center text-bg-{{ type }}"
       role="alert"
       aria-live="assertive"
       aria-atomic="true"
       style="width: auto;">

    <div class="d-flex">
      <div class="toast-body">
        {{ message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"></button>
    </div>

  </div>
</div>
