<div class="contenedor2"> 

    <div class="mat-elevation-z8 contieneTabla">
        <div class="d-flex align-items-center justify-content-between">
            <h1 class="tituloContenedor">Roles</h1>
            <mat-form-field class="contieneFiltro" appearance="outline">
                <mat-label>Buscar por...</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="Buscar por..." #input >
            </mat-form-field>
            <button class="btn boton" routerLink="/principal/crear-editar-rol">
                Crear rol
            </button>
        </div>

        <table mat-table [dataSource]="dataSource" matSort>
            <!-- ID Column -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                <td mat-cell *matCellDef="let row"> {{row.id}} </td>
            </ng-container>

            <!-- Rol Column -->
            <ng-container matColumnDef="rol">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Rol </th>
                <td mat-cell *matCellDef="let row"> {{row.rol}}</td>
            </ng-container>

            <!-- Creado Column -->
            <ng-container matColumnDef="create_at">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Creado </th>
                <td mat-cell *matCellDef="let row"> {{row.created_at | date:'dd-MM-yyyy HH:mm'}} </td>
            </ng-container>

            <!-- Opciones Column -->
            <ng-container matColumnDef="opciones">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Opciones </th>
                <td mat-cell *matCellDef="let row"> 
                    <i class="fa-regular fa-pen-to-square icono-accion icono-edit" 
                        matTooltip="Editar el registro." matTooltipClass="tooltip-personalizado" 
                        matTooltipPosition="left" (click)="editar(row)"></i>
                    
                    @if(row.activo == 0){
                        <i class="fa-regular fa-circle-xmark icono-accion icono-delete" 
                        matTooltip="Desactivar el registro." matTooltipClass="tooltip-personalizado" 
                        matTooltipPosition="right" (click)="estado(row)"><small class="activo">Activo</small></i>
                    }@else{
                        <i class="fa-regular fa-circle-check icono-accion icono-edit" 
                        matTooltip="Activar el registro." matTooltipClass="tooltip-personalizado" 
                        matTooltipPosition="right" (click)="estado(row)"><small class="inactivo">Inactivo</small></i>
                    }
                    

                    
                </td>
            </ng-container>

            <!-- Header Row -->
            <tr mat-header-row *matHeaderRowDef="displayedColumns" class="headerTabla"></tr>

            <!-- Data Rows con index para alternar colores -->
            <tr mat-row *matRowDef="let row; let i = index; columns: displayedColumns;"
                [ngClass]="i % 2 === 0 ? 'fila-par' : 'fila-impar'">
            </tr>

            <!-- Row shown when there is no matching data -->
            <tr class="mat-row fila-con-borde" *matNoDataRow>
                <td class="mat-cell" colspan="4">No se encontraron datos "{{input.value}}"</td>
            </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of datos"></mat-paginator>
    </div>
</div>
