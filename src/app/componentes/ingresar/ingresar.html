
<div class="contenedor2">
    <form class="formulario" [formGroup]="formulario" autocomplete="off">
        <div class="card">
            <h5 class="card-header tituloFormulario">Ingresar al sistema</h5>
            <div class="card-body">
                <div class="contieneInput">
                    <label>NIT</label>
                    <input class="form-control form-control-sm mInput" type="text" formControlName="nit">
                    <small class="smallError">{{ retornaError('nit')}}</small>
                </div>

                <div class="contieneInput">
                    <label>Email</label>
                    <input class="form-control form-control-sm mInput" type="email" formControlName="email">
                    <small class="smallError">{{ retornaError('email')}}</small>
                </div>

                <div class="contieneInput">
                    <label>Contraseña</label>
                    <input class="form-control form-control-sm mInput" type="password" formControlName="clave">
                    <small class="smallError">{{ retornaError('clave')}}</small>
                </div>

                <div class="card-footer btn-group">
                    <button (click)="ingresar()" class="btn btn-sm boton">Ingresar</button>
                    <button routerLink="/" class="btn btn-sm botonCancelar">Cancelar</button>
                </div>   
            </div>
        </div>
    </form>
    <app-toast></app-toast>
</div>
